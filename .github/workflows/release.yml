name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '9.0.x'
    
    - name: Extract version from tag
      id: version
      run: |
        # Extract the clean semver from the tag (e.g., v1.2.3 -> 1.2.3, v1.0.0-beta.1 -> 1.0.0-beta.1).
        # MSBuild derives the numeric AssemblyVersion/FileVersion from this value.
        VERSION=${GITHUB_REF#refs/tags/}
        VERSION_CLEAN=${VERSION#v}
        # Check if this is a prerelease (contains hyphen)
        if [[ "$VERSION_CLEAN" == *-* ]]; then
          echo "prerelease=true" >> $GITHUB_OUTPUT
        else
          echo "prerelease=false" >> $GITHUB_OUTPUT
        fi
        echo "version=${VERSION_CLEAN}" >> $GITHUB_OUTPUT
        echo "Version: ${VERSION_CLEAN}"
    
    - name: Restore dependencies
      run: dotnet restore CheckMods.csproj

    - name: Build and Publish Windows x64
      run: |
        dotnet publish CheckMods.csproj -c Release -r win-x64 -p:BuildVersion=${{ steps.version.outputs.version }} -o ./publish/win-x64

    - name: Build and Publish Linux x64
      run: |
        dotnet publish CheckMods.csproj -c Release -r linux-x64 -p:BuildVersion=${{ steps.version.outputs.version }} -o ./publish/linux-x64
    
    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        files: |
          ./publish/win-x64/CheckMods-*.exe
          ./publish/win-x64/CheckMods-*.zip
          ./publish/linux-x64/CheckMods-*
        generate_release_notes: true
        prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
